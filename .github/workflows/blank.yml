name: Update Source
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешение на запись файла обратно в репо
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Обновили до v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate AltSource
        run: |
          # Устанавливаем генератор прямо во время работы
          npm install -g altsource-cli 
          altsource-cli --config config.json --output apps.json

      - name: Commit and Push
        run: |
          git config --global user.name "SourceBot"
          git config --global user.email "bot@example.com"
          git add apps.json
          git commit -m "Update apps.json" || exit 0
          git push
